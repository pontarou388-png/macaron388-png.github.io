<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>こんにちは世界！</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#f7c7c7;
min-height:100vh;
overflow:hidden;
font-family:'Arial','Hiragino Sans',sans-serif;
position:relative;
}

/* 背景 */

.background{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
object-fit:cover;
z-index:1;
opacity:0.9;
}

/* 大きい女の子 */

.big-character{
position:fixed;
left:-180px;
bottom:-20px;
height:95%;
z-index:3;

animation: floatGirl 4s ease-in-out infinite;
}

/* 小さい女の子 */

.small-character{
position:fixed;
right:20px;
bottom:20px;
width:130px;
z-index:5;

animation: smallFloat 3s ease-in-out infinite;
}

/* メイン文字 */

.container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
z-index:10;
}

/* タイトル */

.main-text{
font-size:5rem;
color:white;
text-shadow:0 4px 20px rgba(0,0,0,0.3);
margin-bottom:30px;
animation: popIn 1s ease;
}

/* 飾り */

.decoration{
display:flex;
justify-content:center;
gap:30px;
margin-bottom:30px;
}

.emoji{
font-size:3rem;
animation:bounce 2s infinite;
}

.emoji:nth-child(2){
animation-delay:0.3s;
}

.emoji:nth-child(3){
animation-delay:0.6s;
}

/* メッセージ */

.message{
font-size:1.5rem;
color:white;
text-shadow:0 2px 10px rgba(0,0,0,0.3);
}

/* ボタン */

.menu{
position:fixed;
right:220px;
top:50%;
transform:translateY(-50%);
display:flex;
flex-direction:column;
gap:25px;
z-index:20;
}

.menu a{
background:rgba(255,255,255,0.85);
padding:18px 35px;
border-radius:20px;
text-decoration:none;
font-size:28px;
font-weight:bold;
color:#ff4f8b;
box-shadow:0 5px 15px rgba(0,0,0,0.2);

transition:0.3s;
}

.menu a:hover{
transform:scale(1.08);
background:white;
}

/* 泡 */

.bubble{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.12);
animation:float 6s infinite ease-in-out;
z-index:2;
}

.bubble:nth-child(1){
width:80px;
height:80px;
left:5%;
top:20%;
}

.bubble:nth-child(2){
width:120px;
height:120px;
left:80%;
top:25%;
animation-delay:1s;
}

.bubble:nth-child(3){
width:60px;
height:60px;
left:60%;
top:60%;
animation-delay:2s;
}

/* アニメーション */

@keyframes float{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-30px);
}
}

@keyframes bounce{
0%,100%{
transform:translateY(0);
}
50%{
transform:translateY(-20px);
}
}

@keyframes popIn{
0%{
transform:scale(0);
opacity:0;
}
100%{
transform:scale(1);
opacity:1;
}
}

/* 女の子ふわふわ */

@keyframes floatGirl{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-25px);
}
}

/* 小さい子 */

@keyframes smallFloat{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-15px);
}
}

</style>
</head>

<body>

<!-- 背景 -->
<img src="big.png" class="background">

<!-- 大きい女の子 -->
<img src="big.png" class="big-character">

<!-- 小さい女の子 -->
<img src="small.png" class="small-character">

<!-- 泡 -->
<div class="bubble"></div>
<div class="bubble"></div>
<div class="bubble"></div>

<!-- メイン -->
<div class="container">

<div class="decoration">
<div class="emoji">✨</div>
<div class="emoji">🌸</div>
<div class="emoji">✨</div>
</div>

<h1 class="main-text">
こんにちは❤世界！
</h1>

<div class="message">
🎀 素敵な1日をお過ごしください 🎀
</div>

</div>

<!-- ボタン -->
<div class="menu">

<a href="profile.html">
自己紹介
</a>

<a href="https://macaronroom.my.canva.site/dahjyvaurje" target="_blank">
タイピングゲーム
</a>

</div>

</body>
</html>
